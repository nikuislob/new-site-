<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Content | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-side" id="side"></aside>
    <main class="admin-main">
      <h1 style="font-size:2.8rem">Content Management</h1>
      <div id="msg"></div>
      <form class="glass form" style="padding:1.2rem;max-width:760px;margin-top:1rem" id="form">
        <label>Hero headline<input name="heroHeadline" /></label>
        <label>Hero subheadline<textarea name="heroSubheadline"></textarea></label>
        <label>Footer text<textarea name="footerText"></textarea></label>
        <label>Contact email<input name="contactEmail" /></label>
        <label>Contact phone<input name="contactPhone" /></label>
        <label>Contact address<input name="contactAddress" /></label>
        <label>WhatsApp URL<input name="whatsapp" /></label>
        <label>Privacy policy<textarea name="privacy"></textarea></label>
        <label>Terms<textarea name="terms"></textarea></label>
        <button class="btn btn-gold" type="submit">Save Content</button>
      </form>
    </main>
  </div>
  <script src="../js/app.js"></script>
  <script src="admin.js"></script>
  <script>
    App.requireAdmin(); Admin.nav("content");
    var data = App.load();
    var form = document.getElementById("form");
    ["heroHeadline","heroSubheadline","footerText","contactEmail","contactPhone","contactAddress","whatsapp","privacy","terms"].forEach(function (k) {
      form.elements[k].value = data.settings[k] || "";
    });
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var fd = new FormData(form);
      data = App.load();
      ["heroHeadline","heroSubheadline","footerText","contactEmail","contactPhone","contactAddress","whatsapp","privacy","terms"].forEach(function (k) {
        data.settings[k] = String(fd.get(k) || "");
      });
      App.save(data);
      document.getElementById("msg").innerHTML = '<div class="notice ok">Content updated</div>';
    });
  </script>
</body>
</html>
