<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bulk Requests | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-side" id="side"></aside>
    <main class="admin-main">
      <h1 style="font-size:2.8rem">Bulk Requests</h1>
      <p class="muted">Customers requesting 3+ tickets.</p>
      <div id="list" style="margin-top:1rem"></div>
    </main>
  </div>
  <script src="../js/app.js"></script>
  <script src="admin.js"></script>
  <script>
    App.requireAdmin(); Admin.nav("bulk");
    function render() {
      var data = App.load();
      document.getElementById("list").innerHTML = data.bulkRequests.map(function (r) {
        return '<div class="glass" style="padding:1rem;margin-bottom:.8rem">' +
          '<div style="display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap">' +
            '<div><strong>' + r.name + ' · ' + r.quantity + ' tickets</strong>' +
            '<div class="muted" style="font-size:.85rem">' + r.email + ' · ' + r.phone + ' · ' + (r.matchLabel || "No match") + '</div>' +
            '<p>' + (r.message || "") + '</p>' +
            '<div class="muted">Status: ' + r.status + (r.adminReply ? ' · Reply: ' + r.adminReply : '') + '</div></div>' +
            '<div style="display:flex;gap:.4rem;flex-wrap:wrap">' +
              '<button class="btn btn-ghost btn-sm" data-done="' + r.id + '">Mark Completed</button>' +
              '<button class="btn btn-danger btn-sm" data-del="' + r.id + '">Delete</button>' +
            '</div></div>' +
            '<div class="grid-2" style="margin-top:.8rem">' +
              '<label>Reply<textarea data-reply="' + r.id + '">' + (r.adminReply || "") + '</textarea></label>' +
              '<div style="display:flex;align-items:end"><button class="btn btn-gold" data-send="' + r.id + '">Send Reply</button></div>' +
            '</div></div>';
      }).join("") || '<p class="muted">No bulk requests yet.</p>';

      document.querySelectorAll("[data-done]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var data = App.load();
          var r = data.bulkRequests.find(function (x) { return x.id === btn.getAttribute("data-done"); });
          if (r) r.status = "COMPLETED";
          App.save(data); render();
        });
      });
      document.querySelectorAll("[data-del]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          if (!confirm("Delete?")) return;
          var data = App.load();
          data.bulkRequests = data.bulkRequests.filter(function (x) { return x.id !== btn.getAttribute("data-del"); });
          App.save(data); render();
        });
      });
      document.querySelectorAll("[data-send]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var id = btn.getAttribute("data-send");
          var reply = document.querySelector('[data-reply="' + id + '"]').value;
          var data = App.load();
          var r = data.bulkRequests.find(function (x) { return x.id === id; });
          if (r) { r.adminReply = reply; r.status = "REPLIED"; }
          App.save(data); render();
        });
      });
    }
    render();
  </script>
</body>
</html>
