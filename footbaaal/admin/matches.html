<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matches | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-side" id="side"></aside>
    <main class="admin-main">
      <h1 style="font-size:2.8rem">Match Management</h1>
      <p class="muted">Add / delete fixtures. Expired matches hide automatically on the public site.</p>
      <div id="msg"></div>
      <form class="glass form" style="padding:1rem;margin:1rem 0" id="form">
        <div class="grid-2">
          <label>Home team<select name="homeTeamId" id="home" required></select></label>
          <label>Away team<select name="awayTeamId" id="away" required></select></label>
          <label>Kickoff<input name="kickoffAt" type="datetime-local" required /></label>
          <label>Stadium<input name="stadium" required /></label>
          <label>Country<input name="country" required /></label>
          <label>City<input name="city" /></label>
        </div>
        <label style="display:flex;align-items:center;gap:.5rem;color:#fff"><input type="checkbox" name="featured" /> Featured</label>
        <button class="btn btn-gold" type="submit">Add Match</button>
      </form>
      <div id="list"></div>
    </main>
  </div>
  <script src="../js/app.js"></script>
  <script src="admin.js"></script>
  <script>
    App.requireAdmin();
    Admin.nav("matches");
    var data = App.load();
    function fillTeams(sel) {
      data.teams.forEach(function (t) {
        var o = document.createElement("option");
        o.value = t.id; o.textContent = t.name; sel.appendChild(o);
      });
    }
    fillTeams(document.getElementById("home"));
    fillTeams(document.getElementById("away"));

    function render() {
      data = App.load();
      document.getElementById("list").innerHTML = data.matches
        .slice()
        .sort(function (a, b) { return new Date(a.kickoffAt) - new Date(b.kickoffAt); })
        .map(function (m) {
          var home = App.getTeam(data, m.homeTeamId);
          var away = App.getTeam(data, m.awayTeamId);
          var expired = new Date(m.kickoffAt) <= new Date();
          return '<div class="glass" style="padding:1rem;margin-bottom:.7rem;display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap">' +
            '<div><strong>' + home.name + ' vs ' + away.name + '</strong><div class="muted" style="font-size:.85rem">' + new Date(m.kickoffAt).toLocaleString() + ' · ' + m.stadium + ' · ' + (expired ? "COMPLETED" : "UPCOMING") + '</div></div>' +
            '<button class="btn btn-danger btn-sm" data-del="' + m.id + '">Delete</button></div>';
        }).join("");
      document.querySelectorAll("[data-del]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          if (!confirm("Delete this match?")) return;
          data.matches = data.matches.filter(function (m) { return m.id !== btn.getAttribute("data-del"); });
          App.save(data);
          render();
        });
      });
    }

    document.getElementById("form").addEventListener("submit", function (e) {
      e.preventDefault();
      var fd = new FormData(e.target);
      if (fd.get("homeTeamId") === fd.get("awayTeamId")) {
        document.getElementById("msg").innerHTML = '<div class="notice error">Teams must differ</div>';
        return;
      }
      data.matches.push({
        id: App.uid("m"),
        homeTeamId: String(fd.get("homeTeamId")),
        awayTeamId: String(fd.get("awayTeamId")),
        kickoffAt: new Date(String(fd.get("kickoffAt"))).toISOString(),
        stadium: String(fd.get("stadium")),
        country: String(fd.get("country")),
        city: String(fd.get("city") || ""),
        featured: !!fd.get("featured"),
        seats: App.buildSeats("UPPER").concat(App.buildSeats("CLOSER"))
      });
      App.save(data);
      document.getElementById("msg").innerHTML = '<div class="notice ok">Match added</div>';
      e.target.reset();
      render();
    });
    render();
  </script>
</body>
</html>
