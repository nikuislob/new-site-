<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login | Pitchora</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <main style="min-height:100vh;display:grid;place-items:center;padding:1rem">
    <form class="glass form" style="width:min(420px,100%);padding:1.4rem" id="form">
      <div class="eyebrow">Admin Access</div>
      <h1 style="font-size:2.4rem">Sign in</h1>
      <div id="err"></div>
      <label>Email<input name="email" type="email" value="admin@pitchora.com" required /></label>
      <label>Password<input name="password" type="password" value="Admin123!" required /></label>
      <button class="btn btn-gold" type="submit">Login</button>
      <p class="muted" style="font-size:.8rem;margin:0">Demo: admin@pitchora.com / Admin123!</p>
      <a class="muted" href="../index.html" style="font-size:.85rem">← Back to site</a>
    </form>
  </main>
  <script src="../js/app.js"></script>
  <script>
    if (App.isAdmin()) location.href = "index.html";
    document.getElementById("form").addEventListener("submit", function (e) {
      e.preventDefault();
      var fd = new FormData(e.target);
      if (App.loginAdmin(String(fd.get("email")), String(fd.get("password")))) {
        location.href = "index.html";
      } else {
        document.getElementById("err").innerHTML = '<div class="notice error">Invalid email or password</div>';
      }
    });
  </script>
</body>
</html>
