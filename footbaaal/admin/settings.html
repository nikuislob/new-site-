<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-side" id="side"></aside>
    <main class="admin-main">
      <h1 style="font-size:2.8rem">Ticket & Payment Settings</h1>
      <div id="msg"></div>
      <form class="glass form" style="padding:1.2rem;max-width:720px;margin-top:1rem" id="form">
        <h2 style="font-size:1.6rem;color:var(--gold)">Prices</h2>
        <div class="grid-2">
          <label>Upper Seat Price ($)<input name="upperPrice" type="number" step="0.01" /></label>
          <label>Closer Seat Price ($)<input name="closerPrice" type="number" step="0.01" /></label>
          <label>Max tickets (1-2)<input name="maxTickets" type="number" min="1" max="2" /></label>
          <label>Service fee %<input name="serviceFeePercent" type="number" step="0.01" /></label>
          <label>Tax %<input name="taxPercent" type="number" step="0.01" /></label>
        </div>
        <label style="display:flex;gap:.5rem;align-items:center;color:#fff"><input type="checkbox" name="serviceFeeEnabled" /> Enable service fee</label>
        <label style="display:flex;gap:.5rem;align-items:center;color:#fff"><input type="checkbox" name="taxEnabled" /> Enable taxes</label>
        <label style="display:flex;gap:.5rem;align-items:center;color:#fff"><input type="checkbox" name="uniquePayment" /> Unique payment amount (&lt; $3)</label>

        <h2 style="font-size:1.6rem;color:var(--gold);margin-top:1rem">Upper payment links</h2>
        <label>Apple Pay URL<input name="upperApplePay" /></label>
        <label>Cash App URL<input name="upperCashApp" /></label>
        <h2 style="font-size:1.6rem;color:var(--gold)">Closer payment links</h2>
        <label>Apple Pay URL<input name="closerApplePay" /></label>
        <label>Cash App URL<input name="closerCashApp" /></label>
        <button class="btn btn-gold" type="submit">Save Settings</button>
      </form>
    </main>
  </div>
  <script src="../js/app.js"></script>
  <script src="admin.js"></script>
  <script>
    App.requireAdmin(); Admin.nav("settings");
    var data = App.load();
    var s = data.settings;
    var form = document.getElementById("form");
    ["upperPrice","closerPrice","maxTickets","serviceFeePercent","taxPercent","upperApplePay","upperCashApp","closerApplePay","closerCashApp"].forEach(function (k) {
      form.elements[k].value = s[k];
    });
    form.elements.serviceFeeEnabled.checked = !!s.serviceFeeEnabled;
    form.elements.taxEnabled.checked = !!s.taxEnabled;
    form.elements.uniquePayment.checked = !!s.uniquePayment;

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var fd = new FormData(form);
      data = App.load();
      data.settings.upperPrice = Number(fd.get("upperPrice"));
      data.settings.closerPrice = Number(fd.get("closerPrice"));
      data.settings.maxTickets = Math.min(2, Number(fd.get("maxTickets")) || 2);
      data.settings.serviceFeePercent = Number(fd.get("serviceFeePercent"));
      data.settings.taxPercent = Number(fd.get("taxPercent"));
      data.settings.serviceFeeEnabled = !!fd.get("serviceFeeEnabled");
      data.settings.taxEnabled = !!fd.get("taxEnabled");
      data.settings.uniquePayment = !!fd.get("uniquePayment");
      data.settings.upperApplePay = String(fd.get("upperApplePay"));
      data.settings.upperCashApp = String(fd.get("upperCashApp"));
      data.settings.closerApplePay = String(fd.get("closerApplePay"));
      data.settings.closerCashApp = String(fd.get("closerCashApp"));
      App.save(data);
      document.getElementById("msg").innerHTML = '<div class="notice ok">Settings saved instantly</div>';
    });
  </script>
</body>
</html>
