<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Customers | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-side" id="side"></aside>
    <main class="admin-main">
      <div style="display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap">
        <div><h1 style="font-size:2.8rem">Customers</h1><p class="muted">Search and export.</p></div>
        <button class="btn btn-ghost" id="exportBtn" type="button">Export CSV</button>
      </div>
      <label style="margin:1rem 0;display:block">Search<input id="q" /></label>
      <div class="glass" style="overflow:auto;padding:.5rem">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Orders</th><th>Spent</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="../js/app.js"></script>
  <script src="admin.js"></script>
  <script>
    App.requireAdmin(); Admin.nav("customers");
    function customers() {
      var data = App.load();
      var map = {};
      data.orders.forEach(function (o) {
        if (!map[o.customerEmail]) map[o.customerEmail] = { name: o.customerName, email: o.customerEmail, phone: o.customerPhone, orders: 0, spent: 0 };
        map[o.customerEmail].orders += 1;
        if (o.paymentStatus === "PAID") map[o.customerEmail].spent += o.paymentAmount;
      });
      return Object.keys(map).map(function (k) { return map[k]; });
    }
    function render() {
      var q = document.getElementById("q").value.trim().toLowerCase();
      var rows = customers().filter(function (c) {
        return !q || (c.name + c.email + c.phone).toLowerCase().indexOf(q) >= 0;
      });
      document.getElementById("tbody").innerHTML = rows.map(function (c) {
        return '<tr><td>' + c.name + '</td><td>' + c.email + '</td><td>' + c.phone + '</td><td>' + c.orders + '</td><td>' + App.money(c.spent) + '</td></tr>';
      }).join("") || '<tr><td colspan="5" class="muted">No customers</td></tr>';
    }
    document.getElementById("q").addEventListener("input", render);
    document.getElementById("exportBtn").addEventListener("click", function () {
      var csv = ["Name,Email,Phone,Orders,Spent"].concat(customers().map(function (c) {
        return [c.name, c.email, c.phone, c.orders, c.spent].map(function (x) { return '"' + x + '"'; }).join(",");
      })).join("\n");
      var a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
      a.download = "customers.csv"; a.click();
    });
    render();
  </script>
</body>
</html>
