<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard | Pitchora</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-side" id="side"></aside>
    <main class="admin-main">
      <h1 style="font-size:2.8rem">Dashboard</h1>
      <p class="muted">Orders, revenue, fixtures, and seat health.</p>
      <div class="stats" id="stats" style="margin:1rem 0"></div>
      <div class="grid-2">
        <section class="glass" style="padding:1rem">
          <h2 style="font-size:1.8rem">Recent Orders</h2>
          <div id="orders"></div>
        </section>
        <section class="glass" style="padding:1rem">
          <h2 style="font-size:1.8rem">Seat Availability</h2>
          <div id="seats"></div>
        </section>
      </div>
    </main>
  </div>
  <script src="../js/app.js"></script>
  <script src="admin.js"></script>
  <script>
    App.requireAdmin();
    Admin.nav("dashboard");
    var data = App.load();
    var matches = App.upcoming(data);
    var paid = data.orders.filter(function (o) { return o.paymentStatus === "PAID"; });
    var revenue = paid.reduce(function (s, o) { return s + o.paymentAmount; }, 0);
    var pending = data.orders.filter(function (o) { return o.paymentStatus === "PENDING"; }).length;
    var bulk = data.bulkRequests.filter(function (b) { return b.status === "PENDING"; }).length;
    var openSeats = matches.reduce(function (s, m) { return s + App.availableCount(m); }, 0);
    document.getElementById("stats").innerHTML = [
      ["Total Orders", data.orders.length],
      ["Revenue", App.money(revenue)],
      ["Upcoming Matches", matches.length],
      ["Bulk Requests", bulk],
      ["Pending Orders", pending],
      ["Open Seats", openSeats]
    ].map(function (x) {
      return '<div class="glass stat"><span class="muted" style="font-size:.75rem;letter-spacing:.15em;text-transform:uppercase">' + x[0] + '</span><b>' + x[1] + '</b></div>';
    }).join("");
    document.getElementById("orders").innerHTML = data.orders.slice(0, 8).map(function (o) {
      return '<div style="display:flex;justify-content:space-between;gap:1rem;padding:.55rem 0;border-bottom:1px solid var(--line)"><div><strong>' + o.orderNumber + '</strong><div class="muted" style="font-size:.8rem">' + o.customerName + '</div></div><div style="text-align:right">' + App.money(o.paymentAmount) + '<div class="muted" style="font-size:.8rem">' + o.paymentStatus + '</div></div></div>';
    }).join("") || '<p class="muted">No orders yet.</p>';
    document.getElementById("seats").innerHTML = matches.map(function (m) {
      var home = App.getTeam(data, m.homeTeamId);
      var away = App.getTeam(data, m.awayTeamId);
      var up = m.seats.filter(function (s) { return s.category === "UPPER" && s.status === "AVAILABLE"; }).length;
      var cl = m.seats.filter(function (s) { return s.category === "CLOSER" && s.status === "AVAILABLE"; }).length;
      return '<div style="display:flex;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid var(--line)"><span>' + home.short + ' vs ' + away.short + '</span><span class="muted">Upper ' + up + ' · Closer ' + cl + '</span></div>';
    }).join("") || '<p class="muted">No upcoming matches.</p>';
  </script>
</body>
</html>
