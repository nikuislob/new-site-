<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Match Details | Pitchora</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container inner">
      <a class="brand" href="index.html"><span class="brand-mark">⚽</span><span class="gold">PITCHORA</span></a>
      <button class="menu-btn" id="menuBtn">☰</button>
      <nav class="nav" id="nav">
        <a href="index.html">Home</a>
        <a href="matches.html">Matches</a>
        <a href="contact.html">Contact</a>
        <a href="faq.html">FAQ</a>
      </nav>
    </div>
  </header>

  <main class="page container" id="content"></main>
  <script src="js/app.js"></script>
  <script>
    App.wireHeader();
    var data = App.load();
    var id = App.qs("id");
    var match = App.upcoming(data).find(function (m) { return m.id === id; }) || data.matches.find(function (m) { return m.id === id; });
    if (!match || new Date(match.kickoffAt) <= new Date()) {
      document.getElementById("content").innerHTML = '<div class="notice error">This match is no longer available.</div><p><a class="btn btn-gold" href="matches.html">Back to matches</a></p>';
    } else {
      var home = App.getTeam(data, match.homeTeamId);
      var away = App.getTeam(data, match.awayTeamId);
      var upper = match.seats.filter(function (s) { return s.category === "UPPER" && s.status === "AVAILABLE"; }).length;
      var closer = match.seats.filter(function (s) { return s.category === "CLOSER" && s.status === "AVAILABLE"; }).length;
      document.getElementById("content").innerHTML =
        '<div class="eyebrow">Match Details</div>' +
        '<h1>' + home.name + ' vs ' + away.name + '</h1>' +
        '<p class="muted">' + match.stadium + ' · ' + match.city + ', ' + match.country + '</p>' +
        '<div class="grid-2" style="margin-top:1.5rem;align-items:start">' +
          '<div class="glass" style="padding:1.2rem">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-bottom:1rem">' +
              '<div class="team"><img src="' + home.logo + '" alt=""><strong>' + home.name + '</strong></div>' +
              '<div class="display" style="color:var(--gold);font-size:2rem">VS</div>' +
              '<div class="team right"><img src="' + away.logo + '" alt=""><strong>' + away.name + '</strong></div>' +
            '</div>' +
            '<div class="meta"><span>' + new Date(match.kickoffAt).toLocaleString() + '</span><span>' + App.availableCount(match) + ' seats left</span></div>' +
            '<div class="eyebrow" style="margin-top:1rem">Countdown</div><div class="countdown" id="matchCd"></div>' +
          '</div>' +
          '<div class="glass" style="padding:1.2rem">' +
            '<h2 style="font-size:2rem;margin-bottom:.4rem">Choose Category</h2>' +
            '<p class="muted">Maximum ' + data.settings.maxTickets + ' tickets per online order.</p>' +
            '<a class="glass" style="display:block;padding:1rem;margin-top:1rem" href="book.html?id=' + match.id + '&category=UPPER">' +
              '<div style="display:flex;justify-content:space-between"><div><strong>Upper Side Seats</strong><div class="muted">' + upper + ' available</div></div><div class="display" style="color:var(--gold);font-size:2rem">' + App.money(data.settings.upperPrice) + '</div></div>' +
            '</a>' +
            '<a class="glass" style="display:block;padding:1rem;margin-top:.8rem" href="book.html?id=' + match.id + '&category=CLOSER">' +
              '<div style="display:flex;justify-content:space-between"><div><strong>Closer View Seats</strong><div class="muted">' + closer + ' available</div></div><div class="display" style="color:var(--gold);font-size:2rem">' + App.money(data.settings.closerPrice) + '</div></div>' +
            '</a>' +
            '<p class="muted" style="margin-top:1rem;font-size:.9rem">Need 3+ tickets? <a href="bulk.html?matchId=' + match.id + '" style="color:var(--gold)">Contact support</a></p>' +
          '</div>' +
        '</div>';
      App.renderCountdown(match.kickoffAt, "matchCd");
    }
  </script>
</body>
</html>
