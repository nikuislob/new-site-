<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FAQ | Pitchora</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container inner">
      <a class="brand" href="index.html"><span class="brand-mark">⚽</span><span class="gold">PITCHORA</span></a>
      <nav class="nav" id="nav">
        <a href="index.html">Home</a>
        <a href="matches.html">Matches</a>
        <a href="faq.html">FAQ</a>
      </nav>
    </div>
  </header>
  <main class="page container">
    <div class="eyebrow">Help</div>
    <h1>FAQ</h1>
    <div id="faq" style="margin-top:1rem;display:grid;gap:.7rem"></div>
  </main>
  <script src="js/app.js"></script>
  <script>
    App.wireHeader();
    var data = App.load();
    document.getElementById("faq").innerHTML = data.settings.faq.map(function (item) {
      return '<details class="glass" style="padding:1rem"><summary style="cursor:pointer;font-weight:700">' + item.q + '</summary><p class="muted" style="margin:.7rem 0 0">' + item.a + '</p></details>';
    }).join("");
  </script>
</body>
</html>
