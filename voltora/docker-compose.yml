services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pitchpass
      POSTGRES_PASSWORD: pitchpass
      POSTGRES_DB: pitchpass
    ports:
      - "5432:5432"
    volumes:
      - pitchpass_pg:/var/lib/postgresql/data

volumes:
  pitchpass_pg:
